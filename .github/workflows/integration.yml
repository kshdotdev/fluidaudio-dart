name: Integration (real models)

# Heavy lane: downloads CoreML models from HuggingFace (100 MB - 1.5 GB) and
# runs end-to-end inference. Never on the PR path.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  FLUTTER_VERSION: 3.44.0

jobs:
  integration-macos:
    name: integration_test on macOS
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Restore FluidAudio model cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/FluidAudio/Models
          key: fluidaudio-models-${{ runner.os }}-v1
      # Run test files one at a time: launching the desktop app twice
      # back-to-back can flake with "Error waiting for a debug connection".
      - name: Run M0 channel integration tests
        run: flutter test integration_test/plugin_integration_test.dart -d macos
        working-directory: example
      - name: Run real-model integration tests
        run: flutter test integration_test/real_models_test.dart -d macos
        working-directory: example
        env:
          FLUIDAUDIO_RUN_MODELS: '1'
